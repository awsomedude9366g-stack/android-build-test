name: Test Android Build (Fixed)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js v22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Java JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Install Dependencies
        run: |
          # FIX 1: Remove bun.lock to avoid peer dep conflict with npm
          rm -f bun.lock
          # FIX 2: Use --legacy-peer-deps to handle lovable-tagger/vite8 conflict
          npm install --legacy-peer-deps

      - name: Build Web Assets
        run: |
          npm run build
          # Safety check - ensure dist folder exists
          if [ ! -d "dist" ] && [ -d "build" ]; then
            echo "Renaming 'build' to 'dist'..."
            mv build dist
          fi
          if [ ! -d "dist" ]; then
            echo "ERROR: dist folder missing!"
            exit 1
          fi
          echo "✅ dist folder found:"
          ls dist/

      - name: Setup Capacitor Android
        run: |
          rm -f capacitor.config.ts capacitor.config.json
          npm install @capacitor/core @capacitor/cli @capacitor/android --legacy-peer-deps
          # FIX 3: Set CI=true to suppress interactive Ionic account prompt
          export CI=true
          npx cap init "android-build-test" "com.lovable.androidbuildtest" --web-dir dist
          npx cap add android
          npx cap sync android
          echo "✅ Capacitor android platform ready"

      - name: Build APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug
          echo "✅ APK built successfully!"

      - name: Upload APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: test-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 3
