    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <style>
      #splash {
        position: fixed; inset: 0; z-index: 99999;
        background: #0D0D1A;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        transition: opacity 0.4s ease;
      }
      #splash.hide { opacity: 0; pointer-events: none; }
      #splash .logo-text {
        font-family: 'Space Grotesk', system-ui, sans-serif;
        font-size: 28px; font-weight: 800;
      }
      #splash .logo-text .ai { color: #FFFFFF; }
      #splash .logo-text .dusk { color: #8B5CF6; }
      #splash .tagline {
        font-size: 11px; color: #4B5563; margin-top: 4px;
        font-family: 'Inter', system-ui, sans-serif;
      }
      #splash .spinner {
        margin-top: 20px; width: 24px; height: 24px;
        border: 2px solid rgba(139,92,246,0.3);
        border-top-color: #8B5CF6;
        border-radius: 50%;
        animation: splash-spin 0.8s linear infinite;
      }
      @keyframes splash-spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="splash">
      <div class="logo-text"><span class="ai">AI</span><span class="dusk">dusk</span></div>
      <div class="tagline">Darkness reveals the truth</div>
      <div class="spinner"></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      setTimeout(function() {
        var s = document.getElementById('splash');
        if (s) { s.classList.add('hide'); setTimeout(function() { s.remove(); }, 400); }
      }, 1500);
    </script>
  </body>
